name: Sync Upstream with Conditional Notification

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:      

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == true

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and Check Updates
        id: sync_check
        run: |
          # 1. 基础配置
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # 2. 添加并强制获取上游分支
          # 明确指定 fetch 映射关系，防止引用丢失
          UPSTREAM_URL="https://github.com/eooce/NanoLimbo.git"
          git remote add upstream $UPSTREAM_URL
          git fetch upstream main:refs/remotes/upstream/main

          # 3. 解决歧义：明确使用 refs/heads/main 指代本地分支
          LOCAL_BRANCH="refs/heads/main"
          REMOTE_BRANCH="refs/remotes/upstream/main"

          # 4. 检查更新情况
          NEW_COMMITS=$(git rev-list --count $LOCAL_BRANCH..$REMOTE_BRANCH)
          
          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "上游没有新内容，跳过后续操作。"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "发现 $NEW_COMMITS 个新提交，准备同步..."
            
            # 5. 切换并合并
            git checkout main
            # 使用 --allow-unrelated-histories 增强兼容性
            if git merge $REMOTE_BRANCH --ff-only || git merge $REMOTE_BRANCH --allow-unrelated-histories -m "Sync upstream"; then
              git push origin main
              echo "sync_result=success" >> $GITHUB_OUTPUT
              echo "commit_count=$NEW_COMMITS" >> $GITHUB_OUTPUT
            else
              echo "sync_result=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: PushPlus Notification
        if: steps.sync_check.outputs.has_updates == 'true'
        run: |
          STATUS="${{ steps.sync_check.outputs.sync_result }}"
          COUNT="${{ steps.sync_check.outputs.commit_count }}"
          REPO_NAME="${{ github.repository }}"
          TIME=$(date "+%Y-%m-%d %H:%M:%S")
          
          if [ "$STATUS" = "success" ]; then
            MSG="✅ **同步成功**\n\n- 仓库: $REPO_NAME\n- 更新内容: 发现了 $COUNT 个新提交并已同步成功。\n- 时间: $TIME"
          else
            MSG="❌ **同步失败**\n\n- 仓库: $REPO_NAME\n- 状态: 合并上游时出现错误，请手动检查（可能存在冲突）。\n- 时间: $TIME"
          fi

          curl -s -X POST "http://www.pushplus.plus/send" \
               -H "Content-Type: application/json" \
               -d "{
                 \"token\": \"7a8278dc72974977a03bb6b804155223\",
                 \"title\": \"GitHub 同步提醒\",
                 \"content\": \"$MSG\",
                 \"template\": \"markdown\"
               }"
