name: 自动同步上游更新
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/eooce/NanoLimbo.git

      - name: 拉取上游更新
        run: git fetch upstream

      - name: 合并并检测是否有更新
        id: merge
        run: |
          merge_output=$(git merge upstream/main --no-edit --allow-unrelated-histories 2>&1)
          echo "result=$merge_output" >> $GITHUB_OUTPUT
          echo "$merge_output"

      - name: 推送更新
        if: success()
        run: git push origin main

      - name: 发送 PushPlus 成功通知
        if: success() && contains(steps.merge.outputs.result, 'Fast-forward')
        run: |
          curl -s -X POST https://www.pushplus.plus/send \
            -d "token=7a8278dc72974977a03bb6b804155223" \
            -d "title=✅  同步上游github仓库成功" \
            -d "content=已自动同步上游最新代码"
